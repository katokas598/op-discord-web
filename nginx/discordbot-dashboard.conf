# Nginx конфигурация для DiscordSer Bot Dashboard
# Поместите этот файл в /etc/nginx/sites-available/discordbot-dashboard
# Затем создайте симлинк: sudo ln -s /etc/nginx/sites-available/discordbot-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Редирект на HTTPS (раскомментируйте после настройки SSL)
    # return 301 https://$server_name$request_uri;

    # Основной прокси на dashboard
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (для real-time обновлений)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Размер буферов
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Статические файлы (если есть)
    location /static/ {
        alias /home/discordbot/bot-2.0-main/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Сжатие
        gzip_static on;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Для POST запросов
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
    }

    # Логирование
    access_log /var/log/nginx/discordbot-dashboard-access.log;
    error_log /var/log/nginx/discordbot-dashboard-error.log;

    # Безопасность
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Скрытие версии Nginx
    server_tokens off;

    # Ограничение размера запроса
    client_max_body_size 10M;
}

